<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Dashboard: ALX Intern Manager</title>
<meta name="theme-color" content="#0452F0" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="icon" type="image/png" sizes="any" href="/favicon.png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
</head>
<body>
<a class="skip" href="#main">Skip to content</a>
<nav>
  <div class="wrap">
    <a class="logo" href="intern.html" aria-label="ALX" id="brand"></a>
    <div class="nav-actions ml">
      <button class="toggle" id="themeToggle" aria-label="Toggle dark mode">
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
      <span class="avatar sm" id="navAvatar"></span>
      <button class="btn btn-ghost btn-sm" id="logout">Sign out</button>
    </div>
  </div>
</nav>

<main class="app-main" id="main">
  <div class="wrap">
    <div class="page-head">
      <div>
        <h1 id="hello">Hi</h1>
        <div class="muted" id="subhead"></div>
      </div>
      <div class="seg" role="tablist" aria-label="Week"></div>
    </div>

    <div class="dash-grid">
      <aside class="side-card">
        <div style="display:flex;align-items:center;gap:14px">
          <span id="ring"></span>
          <div><div style="font-weight:700" id="pctlabel">0% complete</div><div class="muted" style="font-size:.82rem" id="taskcount">0 of 10 tasks</div></div>
        </div>
        <div id="phasebars" style="margin-top:16px"></div>
        <div class="muted" style="font-size:.82rem;margin-top:14px" id="lastact"></div>
        <div class="quickact">
          <button class="btn btn-primary btn-sm" data-tab="log">+ Log today's activity</button>
          <button class="btn btn-ghost btn-sm" data-tab="deliverables">Submit a deliverable</button>
        </div>
      </aside>

      <section>
        <div class="tabs" role="tablist">
          <button role="tab" aria-selected="true" data-tab="roadmap">Roadmap</button>
          <button role="tab" aria-selected="false" data-tab="log">Daily Log</button>
          <button role="tab" aria-selected="false" data-tab="journal">Journal</button>
          <button role="tab" aria-selected="false" data-tab="deliverables">Deliverables</button>
          <button role="tab" aria-selected="false" data-tab="achievements">Achievements</button>
          <button role="tab" aria-selected="false" data-tab="feedback">Feedback</button>
        </div>

        <div class="tabpane active" data-pane="roadmap"><div id="roadmap"></div></div>

        <div class="tabpane" data-pane="log">
          <form class="logform" id="logForm" style="margin-bottom:16px">
            <div class="frow"><select id="logTask" aria-label="Milestone"></select><select id="logStatus" aria-label="Status"></select></div>
            <textarea id="logNote" class="full" placeholder="What did you work on? Wins, blockers, reflections…"></textarea>
            <button class="btn btn-primary full" type="submit">Add to log</button>
          </form>
          <div id="logList"></div>
        </div>

        <div class="tabpane" data-pane="journal">
          <form class="logform" id="jForm" style="margin-bottom:16px">
            <textarea id="jText" class="full" placeholder="A reflection on today…"></textarea>
            <button class="btn btn-primary btn-sm" type="submit">Save entry</button>
          </form>
          <div id="jList"></div>
        </div>

        <div class="tabpane" data-pane="deliverables">
          <form class="logform" id="dForm" style="margin-bottom:16px">
            <input type="text" id="dTitle" placeholder="Deliverable title (e.g. Day-2 pitch deck)" />
            <input type="text" id="dLink" placeholder="Link (Google Doc / Drive / Figma URL)" />
            <button class="btn btn-primary btn-sm" type="submit">Submit deliverable</button>
          </form>
          <div id="dList"></div>
        </div>

        <div class="tabpane" data-pane="achievements">
          <form class="logform" id="aForm" style="margin-bottom:16px">
            <input type="text" id="aText" placeholder="Something you're proud of…" />
            <button class="btn btn-primary btn-sm" type="submit">Add achievement</button>
          </form>
          <div id="aList"></div>
        </div>

        <div class="tabpane" data-pane="feedback"><div id="fbList"></div></div>
      </section>
    </div>
  </div>
</main>

<script src="data.js"></script>
<script>
  let ID, me, week = 1;
  const S = { prog:{}, last:0, logs:[], journal_entries:[], deliverables:[], achievements:[], feedback:[] };

  (async function boot(){
    if (!(await DB.session())) { location.href = "index.html"; return; }
    me = await DB.me();
    if (me && me.role === "admin") { location.href = "admin.html"; return; }
    ID = me.id;
    document.getElementById("brand").innerHTML = UI.logo + '<span class="pname">Intern Manager</span>';
    document.getElementById("navAvatar").textContent = UI.initials(me.full_name || me.email);
    document.getElementById("hello").textContent = "Welcome, " + (me.full_name || me.email) + ", to your Internship Program.";
    document.getElementById("subhead").textContent = (me.pillar || "Intern") + " · " + IM.COHORT.name;
    UI.wireToggle(document.getElementById("themeToggle"));
    document.getElementById("logout").addEventListener("click", async () => { await DB.signOut(); location.href = "index.html"; });

    document.getElementById("logTask").innerHTML = IM.ALLDAYS.map(d=>`<option value="${d.id}">${d.label}: ${d.title}</option>`).join("");
    document.getElementById("logStatus").innerHTML = IM.STATUSES.map(s=>`<option value="${s.id}">${s.label}</option>`).join("");
    document.getElementById("logStatus").value = "in_progress";

    const seg = document.querySelector(".seg");
    seg.innerHTML = IM.PHASES.map(p=>`<button role="tab" data-week="${p.id}" aria-selected="${p.id===1}">${p.name}</button>`).join("");
    seg.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{
      seg.querySelectorAll("button").forEach(x=>x.setAttribute("aria-selected","false"));
      b.setAttribute("aria-selected","true"); week=+b.dataset.week; renderRoadmap();
    }));
    wireTabs(); wireForms();
    await refreshAll();
  })();

  async function refreshAll(){
    const [prog,last,logs,journal,deliv,achv,fb] = await Promise.all([
      DB.progress(ID), DB.lastActivity(ID), DB.logs(ID),
      DB.list("journal_entries",ID), DB.list("deliverables",ID), DB.list("achievements",ID), DB.list("feedback",ID) ]);
    S.prog=prog; S.last=last; S.logs=logs; S.journal_entries=journal; S.deliverables=deliv; S.achievements=achv; S.feedback=fb;
    renderStats(); renderRoadmap(); renderLogs(); renderJournal(); renderDeliverables(); renderAchievements(); renderFeedback();
  }
  async function refreshProgress(){
    [S.prog,S.last,S.logs] = await Promise.all([DB.progress(ID),DB.lastActivity(ID),DB.logs(ID)]);
    renderStats(); renderRoadmap(); renderLogs();
  }

  function renderStats(){
    const m = IM.metrics(S.prog);
    document.getElementById("ring").innerHTML = UI.ring(m.pct, 64);
    document.getElementById("pctlabel").textContent = m.pct + "% complete";
    document.getElementById("taskcount").textContent = m.completed + " of " + m.total + " tasks";
    document.getElementById("phasebars").innerHTML = IM.PHASES.map(p=>{
      const pm = IM.phaseMetrics(S.prog,p.id);
      return `<div class="phase-row"><div class="ptop"><span class="pp">${p.name}</span><span>${pm.done}/${pm.total}</span></div><div class="bar sm"><i style="width:${pm.pct}%"></i></div></div>`;
    }).join("");
    document.getElementById("lastact").textContent = "Last activity: " + UI.timeAgo(S.last) + (m.blocked? " · ⚠ "+m.blocked+" blocked":"");
  }

  function renderRoadmap(){
    const days = IM.PHASES.find(p=>p.id===week).days;
    document.getElementById("roadmap").innerHTML = days.map(d=>{
      const t = S.prog[d.id] || {status:"not_started"};
      const node = t.status==="completed"?"✓":t.status==="blocked"?"!":d.id;
      return `<details class="ms ${t.status.replace('_','-')}">
        <summary>
          <div class="node" aria-hidden="true">${node}</div>
          <div class="sum-main"><div class="dnum">${d.label}</div><div class="mtitle">${d.title}</div></div>
          <span class="chev" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></span>
        </summary>
        <div class="body">
          <span class="tag ${d.flag?'flag':''}">${d.tag}</span><p>${d.desc}</p>
          <select class="rstat" data-task="${d.id}" aria-label="Status" style="margin-top:6px">${IM.STATUSES.map(s=>`<option value="${s.id}" ${s.id===t.status?'selected':''}>${s.label}</option>`).join("")}</select>
          <textarea class="rnote full" data-task="${d.id}" placeholder="Reflection for this milestone…" style="margin-top:8px;min-height:44px">${UI.esc(t.note||"")}</textarea>
        </div>
      </details>`;
    }).join("");
    document.querySelectorAll(".rstat").forEach(sel=>sel.addEventListener("change", async ()=>{
      sel.disabled=true; await DB.setStatus(ID,+sel.dataset.task,sel.value,(S.prog[+sel.dataset.task]||{}).note||""); await refreshProgress();
    }));
    document.querySelectorAll(".rnote").forEach(ta=>ta.addEventListener("change", async ()=>{
      await DB.setNote(ID,+ta.dataset.task,ta.value.trim());
    }));
  }

  function renderLogs(){
    document.getElementById("logList").innerHTML = S.logs.length? S.logs.map(l=>{
      const d = IM.ALLDAYS.find(x=>x.id===l.task_id);
      return `<div class="list-item"><b>${d?d.title:'General'}</b> · ${IM.statusLabel(l.status)}<div class="meta">${UI.timeAgo(new Date(l.created_at).getTime())}${l.note?' · '+UI.esc(l.note):''}</div></div>`;
    }).join("") : `<div class="empty">No log entries yet.</div>`;
  }
  function renderListInto(arr, elId, render, table){
    document.getElementById(elId).innerHTML = arr.length? arr.map(render).join("") : `<div class="empty">Nothing here yet.</div>`;
    document.querySelectorAll(`#${elId} .del`).forEach(b=>b.addEventListener("click", async ()=>{ await DB.remove(table,b.dataset.id); await refreshAll(); }));
  }
  function renderJournal(){ renderListInto(S.journal_entries,"jList",j=>`<div class="list-item"><button class="del" data-id="${j.id}" aria-label="Delete">✕</button>${UI.esc(j.content)}<div class="meta">${UI.timeAgo(new Date(j.created_at).getTime())}</div></div>`,"journal_entries"); }
  function renderDeliverables(){ renderListInto(S.deliverables,"dList",d=>`<div class="list-item"><button class="del" data-id="${d.id}" aria-label="Delete">✕</button><b>${UI.esc(d.title)}</b> <span class="pill ${d.status==='approved'?'good':d.status==='revise'?'warn':''}">${d.status}</span><div class="meta">${d.link?`<a href="${UI.esc(d.link)}" target="_blank" rel="noopener" style="color:var(--primary)">Open link ↗</a> · `:''}${UI.timeAgo(new Date(d.created_at).getTime())}</div></div>`,"deliverables"); }
  function renderAchievements(){ renderListInto(S.achievements,"aList",a=>`<div class="list-item"><button class="del" data-id="${a.id}" aria-label="Delete">✕</button>★ ${UI.esc(a.text)}<div class="meta">${UI.timeAgo(new Date(a.created_at).getTime())}</div></div>`,"achievements"); }
  function renderFeedback(){
    document.getElementById("fbList").innerHTML = S.feedback.length? S.feedback.map(f=>
      `<div class="feedback-item"><div class="who-row"><span class="avatar sm">★</span> Program staff · ${UI.timeAgo(new Date(f.created_at).getTime())}${f.kind==='evaluation'?' · evaluation':''}</div>${UI.esc(f.content)}</div>`
    ).join("") : `<div class="empty">No feedback yet. It'll appear here when your mentor adds it.</div>`;
  }

  function wireTabs(){
    function showTab(name){
      document.querySelectorAll(".tabs button").forEach(b=>b.setAttribute("aria-selected", b.dataset.tab===name));
      document.querySelectorAll(".tabpane").forEach(p=>p.classList.toggle("active",p.dataset.pane===name));
    }
    document.querySelectorAll(".tabs button").forEach(b=>b.addEventListener("click",()=>showTab(b.dataset.tab)));
    document.querySelectorAll("[data-tab]").forEach(b=>{ if(!b.closest(".tabs")) b.addEventListener("click",()=>{ showTab(b.dataset.tab); scrollTo({top:0,behavior:'smooth'}); }); });
  }
  function wireForms(){
    document.getElementById("logForm").addEventListener("submit", async e=>{e.preventDefault();
      await DB.setStatus(ID,+document.getElementById("logTask").value,document.getElementById("logStatus").value,document.getElementById("logNote").value.trim());
      document.getElementById("logNote").value=""; await refreshProgress(); });
    document.getElementById("jForm").addEventListener("submit", async e=>{e.preventDefault();
      const v=document.getElementById("jText").value.trim(); if(!v)return; await DB.add("journal_entries",ID,{content:v}); document.getElementById("jText").value=""; S.journal_entries=await DB.list("journal_entries",ID); renderJournal(); });
    document.getElementById("dForm").addEventListener("submit", async e=>{e.preventDefault();
      const t=document.getElementById("dTitle").value.trim(); if(!t)return;
      await DB.add("deliverables",ID,{title:t,link:document.getElementById("dLink").value.trim()||null,status:"submitted"});
      document.getElementById("dTitle").value="";document.getElementById("dLink").value=""; S.deliverables=await DB.list("deliverables",ID); renderDeliverables(); });
    document.getElementById("aForm").addEventListener("submit", async e=>{e.preventDefault();
      const v=document.getElementById("aText").value.trim(); if(!v)return; await DB.add("achievements",ID,{text:v}); document.getElementById("aText").value=""; S.achievements=await DB.list("achievements",ID); renderAchievements(); });
  }
</script>
</body>
</html>
