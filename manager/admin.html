<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Internship Dashboard: ALX Intern Manager</title>
<meta name="theme-color" content="#0452F0" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="icon" type="image/png" sizes="any" href="/favicon.png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<a class="skip" href="#main">Skip to content</a>
<nav>
  <div class="wrap">
    <a class="logo" href="admin.html" aria-label="ALX" id="brand"></a>
    <div class="nav-actions ml">
      <button class="toggle" id="themeToggle" aria-label="Toggle dark mode">
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
      <span class="avatar sm" id="navAvatar"></span>
      <button class="btn btn-ghost btn-sm" id="logout">Sign out</button>
    </div>
  </div>
</nav>

<main class="app-main" id="main">
  <div class="wrap">
    <div class="page-head">
      <div><h1>Internship Dashboard</h1><div class="muted" id="cohortName"></div></div>
      <div style="display:flex;gap:10px;align-items:center">
        <div class="seg" id="viewToggle"><button data-view="cards" aria-selected="true">Cards</button><button data-view="table" aria-selected="false">Table</button></div>
        <button class="btn btn-ghost btn-sm" id="exportCsv">Export CSV</button>
      </div>
    </div>

    <div class="kpis" id="kpis"></div>
    <div id="attention"></div>
    <div id="cards" class="intern-grid"></div>
    <div id="tableWrap" style="display:none"></div>

    <div class="panel" style="margin-top:26px">
      <h3>Cohort reporting</h3>
      <div class="ph-sub">Snapshot of where the cohort stands.</div>
      <div id="report"></div>
    </div>
  </div>
</main>

<!-- Intern detail drawer -->
<div class="drawer-bg" id="drawerBg"></div>
<aside class="drawer" id="drawer" aria-label="Intern detail">
  <div class="dhead" id="dHead"></div>
  <div class="dbody" id="dBody"></div>
</aside>

<script src="data.js"></script>
<script>
  Store.init();
  const me = Store.currentUser();
  if(!me){ location.href="index.html"; }
  else if(me.role==="intern"){ location.href="intern.html"; }
  document.getElementById("brand").innerHTML = UI.logo + '<span class="pname">Intern Manager</span>';
  document.getElementById("navAvatar").textContent = UI.initials(me.name);
  document.getElementById("cohortName").textContent = IM.COHORT.name + " · " + Store.interns().length + " interns";
  UI.wireToggle(document.getElementById("themeToggle"));
  document.getElementById("logout").addEventListener("click",()=>{ Store.logout(); location.href="index.html"; });

  const statusPill = id => { const m=Store.metrics(id);
    if(m.blocked>0) return '<span class="pill bad">Blocked</span>';
    if(Store.isAtRisk(id)) return '<span class="pill warn">At risk</span>';
    if(m.pct===100) return '<span class="pill good">Complete</span>';
    return '<span class="pill good">On track</span>'; };

  function renderKpis(){
    const c = Store.cohortMetrics();
    document.getElementById("kpis").innerHTML = `
      <div class="metric accent"><div class="mlabel">Avg completion</div><div class="mval">${c.avg}%</div><div class="msub">${c.completedTasks}/${c.totalTasks} tasks</div></div>
      <div class="metric"><div class="mlabel">Interns</div><div class="mval">${c.count}</div><div class="msub">in cohort</div></div>
      <div class="metric"><div class="mlabel">At risk</div><div class="mval" style="color:var(--sunflower)">${c.atRisk}</div><div class="msub">need a nudge</div></div>
      <div class="metric"><div class="mlabel">Blocked</div><div class="mval" style="color:var(--blocked)">${c.blocked}</div><div class="msub">need attention</div></div>`;
  }
  function renderAttention(){
    const flagged = Store.interns().filter(i=>Store.isAtRisk(i.id));
    document.getElementById("attention").innerHTML = flagged.length? `<div class="attention"><h3>⚠ Needs attention</h3>${
      flagged.map(i=>{const m=Store.metrics(i.id);const reason=m.blocked>0?`${m.blocked} task(s) blocked`:`no activity in ${Math.floor((Date.now()-Store.lastActivity(i.id))/86400000)}d`;
      return `<div class="row"><span class="avatar sm">${UI.initials(i.name)}</span><b>${i.name}</b> · ${reason} <button class="btn btn-ghost btn-sm" style="margin-left:auto" data-open="${i.id}">Open</button></div>`;}).join("")
    }</div>` : "";
    wireOpen();
  }
  function renderCards(){
    document.getElementById("cards").innerHTML = Store.interns().map(i=>{
      const m=Store.metrics(i.id);
      return `<button class="icard" data-open="${i.id}">
        <div class="top"><span class="avatar">${UI.initials(i.name)}</span><div><div class="nm">${i.name}</div><div class="pl">${i.pillar}</div></div></div>
        <div class="mid">${UI.ring(m.pct,56)}<div style="text-align:right">${statusPill(i.id)}<div class="pl" style="margin-top:6px">${m.completed}/${m.total} done</div></div></div>
        <div class="foot"><span>Last active</span><span>${UI.timeAgo(Store.lastActivity(i.id))}</span></div>
      </button>`;
    }).join("");
    wireOpen();
  }
  function renderTable(){
    document.getElementById("tableWrap").innerHTML = `<div class="table-scroll"><table class="ctable"><thead><tr>
      <th>Intern</th><th>Pillar</th><th>Progress</th><th>Status</th><th>Blocked</th><th>Last active</th></tr></thead><tbody>${
      Store.interns().map(i=>{const m=Store.metrics(i.id);
        return `<tr data-open="${i.id}"><td><div class="nmcell"><span class="avatar sm">${UI.initials(i.name)}</span>${i.name}</div></td>
        <td>${i.pillar}</td><td><span class="prog"><span class="minibar"><i style="width:${m.pct}%"></i></span>${m.pct}%</span></td>
        <td>${statusPill(i.id)}</td><td>${m.blocked||"0"}</td><td>${UI.timeAgo(Store.lastActivity(i.id))}</td></tr>`;}).join("")
    }</tbody></table></div>`;
    wireOpen();
  }
  function renderReport(){
    const c=Store.cohortMetrics();
    const dist = Store.interns().map(i=>`${i.name.split(" ")[0]} ${Store.metrics(i.id).pct}%`).join(" · ");
    document.getElementById("report").innerHTML = `
      <div class="perf"><div class="pgrid">
        <div class="pcell"><b>${c.avg}%</b><span>Average completion</span></div>
        <div class="pcell"><b>${c.completedTasks}</b><span>Tasks completed (cohort)</span></div>
        <div class="pcell"><b>${c.atRisk}</b><span>Interns at risk</span></div>
        <div class="pcell"><b>${Math.round(c.completedTasks/c.totalTasks*100)}%</b><span>Cohort throughput</span></div>
      </div></div>
      <div class="muted" style="font-size:.86rem;margin-top:12px">Per-intern: ${dist}</div>`;
  }

  // view toggle
  document.getElementById("viewToggle").querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{
    document.getElementById("viewToggle").querySelectorAll("button").forEach(x=>x.setAttribute("aria-selected","false"));
    b.setAttribute("aria-selected","true");
    const cards=b.dataset.view==="cards";
    document.getElementById("cards").style.display=cards?"grid":"none";
    document.getElementById("tableWrap").style.display=cards?"none":"block";
    if(!cards) renderTable();
  }));

  // CSV export
  document.getElementById("exportCsv").addEventListener("click",()=>{
    const rows=[["Name","Email","Pillar","Completion %","Completed","Blocked","Status","Last active"]];
    Store.interns().forEach(i=>{const m=Store.metrics(i.id);
      rows.push([i.name,i.email,i.pillar,m.pct,m.completed,m.blocked, m.blocked>0?"Blocked":Store.isAtRisk(i.id)?"At risk":"On track", new Date(Store.lastActivity(i.id)).toISOString().slice(0,10)]);});
    const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="alx-cohort-report.csv";a.click();URL.revokeObjectURL(a.href);
  });

  /* ---------- drawer / intern profile ---------- */
  const drawer=document.getElementById("drawer"), bg=document.getElementById("drawerBg");
  function closeDrawer(){ drawer.classList.remove("open"); bg.classList.remove("open"); }
  bg.addEventListener("click",closeDrawer);
  document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeDrawer(); });
  function wireOpen(){ document.querySelectorAll("[data-open]").forEach(el=>{ el.onclick=()=>openIntern(el.dataset.open); }); }

  let DTAB="overview";
  function openIntern(id){
    const i=Store.user(id), m=Store.metrics(id);
    document.getElementById("dHead").innerHTML = `
      <span class="avatar lg">${UI.initials(i.name)}</span>
      <div><div style="font-weight:700;font-size:1.1rem">${i.name}</div><div class="muted" style="font-size:.84rem">${i.pillar} · ${statusPill(id)}</div></div>
      <button class="x" aria-label="Close" id="dClose">✕</button>`;
    document.getElementById("dClose").onclick=closeDrawer;
    DTAB="overview"; renderDrawer(id);
    drawer.classList.add("open"); bg.classList.add("open");
  }
  function renderDrawer(id){
    const i=Store.user(id);
    const tabs=["overview","activity","journal","deliverables","feedback"];
    const labels={overview:"Roadmap",activity:"Activity",journal:"Journal",deliverables:"Deliverables",feedback:"Feedback"};
    let html=`<div class="tabs">${tabs.map(t=>`<button data-dtab="${t}" aria-selected="${t===DTAB}">${labels[t]}</button>`).join("")}</div><div id="dpane"></div>`;
    document.getElementById("dBody").innerHTML=html;
    document.querySelectorAll("[data-dtab]").forEach(b=>b.addEventListener("click",()=>{DTAB=b.dataset.dtab;renderDrawer(id);}));
    const pane=document.getElementById("dpane");

    if(DTAB==="overview"){
      const prog=Store.progress(id);
      pane.innerHTML = `<div style="display:flex;align-items:center;gap:14px;margin-bottom:12px">${UI.ring(Store.metrics(id).pct,60)}
        <div>${IM.PHASES.map(p=>{const pm=Store.phaseMetrics(id,p.id);return `<div class="phase-row" style="min-width:200px"><div class="ptop"><span class="pp">${p.name}</span><span>${pm.done}/${pm.total}</span></div><div class="bar sm"><i style="width:${pm.pct}%"></i></div></div>`;}).join("")}</div></div>`
        + IM.ALLDAYS.map(d=>{const t=prog[d.id]||{status:"not_started"};
          return `<div class="ms ${t.status.replace('_','-')}" style="border-radius:10px"><summary style="cursor:default"><div class="node" aria-hidden="true">${t.status==="completed"?"✓":t.status==="blocked"?"!":d.id}</div><div class="sum-main"><div class="dnum">${d.label}</div><div class="mtitle" style="font-size:.94rem">${d.title}</div></div><span class="pill ${t.status==='completed'?'good':t.status==='blocked'?'bad':t.status==='in_progress'?'warn':''}">${IM.statusLabel(t.status)}</span></summary>${t.note?`<div class="body" style="padding-left:72px"><em>${UI.esc(t.note)}</em></div>`:''}</div>`;}).join("");
    }
    else if(DTAB==="activity"){
      const logs=Store.list("logs",id);
      pane.innerHTML = `<ul class="updates">${logs.length?logs.map(l=>{const d=IM.ALLDAYS.find(x=>x.id===l.taskId);
        return `<li class="s-${l.status.replace('_','-')}"><div class="u-txt"><b>${d?d.title:'General'}</b> · ${IM.statusLabel(l.status)}${l.note?': '+UI.esc(l.note):''}</div><div class="u-time">${UI.timeAgo(l.ts)}</div></li>`;}).join(""):'<div class="empty">No activity yet.</div>'}</ul>`;
    }
    else if(DTAB==="journal"){
      const j=Store.list("journal",id);
      pane.innerHTML = j.length? j.map(x=>`<div class="list-item">${UI.esc(x.content)}<div class="meta">${UI.timeAgo(x.ts)}</div></div>`).join(""):'<div class="empty">No journal entries shared.</div>';
    }
    else if(DTAB==="deliverables"){
      const ds=Store.list("deliverables",id);
      pane.innerHTML = ds.length? ds.map(d=>`<div class="list-item"><b>${UI.esc(d.title)}</b> <span class="pill ${d.status==='approved'?'good':d.status==='revise'?'warn':''}">${d.status}</span>
        <div class="meta">${d.link?`<a href="${UI.esc(d.link)}" target="_blank" rel="noopener" style="color:var(--primary)">Open ↗</a> · `:''}${UI.timeAgo(d.ts)}</div>
        <div style="margin-top:8px;display:flex;gap:8px"><button class="btn btn-primary btn-sm" data-appr="${d.id}">Approve</button><button class="btn btn-ghost btn-sm" data-rev="${d.id}">Request revise</button></div></div>`).join(""):'<div class="empty">No deliverables submitted yet.</div>';
      pane.querySelectorAll("[data-appr]").forEach(b=>b.addEventListener("click",()=>{Store.setDeliverableStatus(id,b.dataset.appr,"approved");renderDrawer(id);}));
      pane.querySelectorAll("[data-rev]").forEach(b=>b.addEventListener("click",()=>{Store.setDeliverableStatus(id,b.dataset.rev,"revise");renderDrawer(id);}));
    }
    else if(DTAB==="feedback"){
      const fb=Store.list("feedback",id);
      pane.innerHTML = `
        <form id="fbForm" class="logform" style="margin-bottom:16px">
          <textarea id="fbText" class="full" placeholder="Write feedback for ${i.name.split(' ')[0]}…"></textarea>
          <button class="btn btn-primary btn-sm" type="submit">Post feedback</button>
        </form>
        <details class="qa" style="margin-bottom:16px"><summary>Weekly evaluation (rubric)<span class="ic">+</span></summary><div class="ans" style="max-height:none;padding:14px 16px">
          <div class="rubric">
            ${["Execution","Communication","Ownership","Growth"].map(k=>`<label>${k}<input type="range" min="1" max="5" value="4" data-r="${k}"><span class="rv">4</span></label>`).join("")}
          </div>
          <textarea id="evalSummary" class="full" placeholder="Summary for the week…" style="margin-top:8px"></textarea>
          <button class="btn btn-primary btn-sm" id="saveEval" style="margin-top:8px">Save evaluation</button>
        </div></details>
        <div id="fbItems">${fb.length?fb.map(f=>{const a=Store.user(f.authorId);
          return `<div class="feedback-item"><div class="who-row"><span class="avatar sm">${a?UI.initials(a.name):'?'}</span> ${a?a.name:'?'} · ${UI.timeAgo(f.ts)}${f.kind==='evaluation'?' · evaluation':''}</div>${UI.esc(f.content)}</div>`;}).join(""):'<div class="empty">No feedback yet.</div>'}</div>`;
      pane.querySelector("#fbForm").addEventListener("submit",e=>{e.preventDefault();const v=pane.querySelector("#fbText").value.trim();if(!v)return;
        Store.add("feedback",id,{authorId:me.id,kind:"comment",content:v});renderDrawer(id);});
      pane.querySelectorAll('input[type=range]').forEach(r=>r.addEventListener("input",()=>{r.nextElementSibling.textContent=r.value;}));
      pane.querySelector("#saveEval").addEventListener("click",()=>{
        const scores={};pane.querySelectorAll('input[type=range]').forEach(r=>scores[r.dataset.r]=+r.value);
        const sum=pane.querySelector("#evalSummary").value.trim();
        const avg=(Object.values(scores).reduce((a,b)=>a+b,0)/4).toFixed(1);
        Store.add("feedback",id,{authorId:me.id,kind:"evaluation",content:`Weekly evaluation (avg ${avg}/5): ${sum||'(no summary)'} [${Object.entries(scores).map(([k,v])=>k+' '+v).join(', ')}]`});
        renderDrawer(id);
      });
    }
  }

  function refresh(){ renderKpis(); renderAttention(); renderCards(); renderReport();
    if(document.querySelector('#viewToggle [data-view="table"][aria-selected="true"]')) renderTable(); }
  refresh();
</script>
</body>
</html>
