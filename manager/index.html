<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in: ALX Intern Manager</title>
<meta name="theme-color" content="#0452F0" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="icon" type="image/png" sizes="any" href="/favicon.png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="signin">
  <div class="signin-card">
    <div class="signin-head">
      <div class="logo" id="brandRow"></div>
      <h1>Log in</h1>
    </div>
    <div class="sub">Choose your profile to continue. Each person only sees what their role allows.</div>
    <div class="who" id="who"></div>
    <a class="btn btn-ghost btn-sm" href="../index.html" style="margin-top:18px">&larr; Back to Home</a>
    <div class="signin-note">Demo sign-in. In production this becomes one-tap email login, with each user keeping their own private account.</div>
  </div>
</div>
<script src="data.js"></script>
<script>
  document.getElementById("brandRow").innerHTML = UI.logo;
  Store.init();
  const who = document.getElementById("who");
  who.innerHTML = Store.users().map(u=>`
    <button data-id="${u.id}">
      <span class="avatar sm">${UI.initials(u.name)}</span>
      <span><span class="nm">${u.name}</span><br><span class="rl">${u.role==='admin'?'Program Manager (Admin)':'Intern · '+u.pillar}</span></span>
      <span class="go" aria-hidden="true">→</span>
    </button>`).join("");
  who.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{
    Store.login(b.dataset.id);
    const u = Store.user(b.dataset.id);
    location.href = u.role==='admin' ? 'admin.html' : 'intern.html';
  }));
</script>
</body>
</html>
