<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in: ALX Intern Manager</title>
<meta name="theme-color" content="#0452F0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="signin">
  <div class="signin-card">
    <div class="brand-row logo">__LOGO__ <span class="pname" style="border-left:1px solid var(--border);padding-left:10px">Intern Manager</span></div>
    <h1>Welcome back</h1>
    <div class="sub">Choose your profile to continue. Each person sees only what their role allows.</div>
    <div class="who" id="who"></div>
    <div class="signin-note">Demo mode: select a profile to explore. In production this is one-tap Google sign-in (interns keep their own private accounts).</div>
  </div>
</div>
<script src="data.js"></script>
<script>
  document.querySelector(".brand-row").innerHTML = UI.logo + document.querySelector(".pname").outerHTML;
  Store.init();
  const who = document.getElementById("who");
  who.innerHTML = Store.users().map(u=>`
    <button data-id="${u.id}">
      <span class="avatar sm">${UI.initials(u.name)}</span>
      <span><span class="nm">${u.name}</span><br><span class="rl">${u.role==='admin'?'Program Manager (Admin)':'Intern · '+u.pillar}</span></span>
      <span class="go" aria-hidden="true">→</span>
    </button>`).join("");
  who.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{
    Store.login(b.dataset.id);
    const u = Store.user(b.dataset.id);
    location.href = u.role==='admin' ? 'admin.html' : 'intern.html';
  }));
</script>
</body>
</html>
